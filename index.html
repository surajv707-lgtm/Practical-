<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f5f9;
padding:15px;
}

.header{
background:#2563eb;
color:white;
padding:18px;
border-radius:15px;
text-align:center;
margin-bottom:15px;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h3{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.card p{
font-size:22px;
font-weight:bold;
}

.table-box{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:600px;
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f8fafc;
}

@media(max-width:600px){

.cards{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="header">
<h2>UPI Transaction Dashboard</h2>
<p>Live Expense Tracker</p>
</div>

<div class="cards">

<div class="card">
<h3>Total Spent</h3>
<p id="totalSpent">₹0</p>
</div>

<div class="card">
<h3>Total Transactions</h3>
<p id="totalTxn">0</p>
</div>

</div>

<div class="table-box">

<table>

<thead>
<tr>
<th>Amount</th>
<th>Bank</th>
<th>Merchant</th>
<th>Txn ID</th>
<th>Date</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://bggiqwpjqbzwyvrjcpgt.supabase.co";

const SUPABASE_ANON_KEY =
"YOUR_ANON_KEY_HERE";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

async function loadTransactions() {

  const tbody = document.getElementById("tbody");

  tbody.innerHTML = "";

  let total = 0;

  const { data, error } = await supabase
    .from("transactions")
    .select("*");

  if (error) {
    console.log(error);
    alert("Supabase connection error");
    return;
  }

  data.forEach(item => {

    total += Number(item.amount || 0);

    tbody.innerHTML += `
      <tr>
        <td>₹${item.amount}</td>
        <td>${item.bank}</td>
        <td>${item.merchant}</td>
        <td>${item.txn_id}</td>
        <td>${item.date}</td>
      </tr>
    `;

  });

  document.getElementById("totalSpent").innerText =
    "₹" + total;

  document.getElementById("totalTxn").innerText =
    data.length;
}

loadTransactions();

</script>

</body>
</html>
